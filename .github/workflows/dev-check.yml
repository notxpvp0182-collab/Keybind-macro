name: Dev Build Check

on:
  push:
    branches: [ dev, develop, feature/** ]
  pull_request:

jobs:
  check:
    name: Compile Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Compile only (fast check)
        run: ./gradlew compileJava --no-daemon
        env:
          GRADLE_OPTS: "-Xmx1g"

      - name: Upload dev JAR
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: keyboard-macro-dev-${{ github.sha }}
          path: build/libs/*.jar
          retention-days: 7
